name: 🚀 Arvexo AI Consulting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────
#  JOBS
# ──────────────────────────────────────────────────────────
jobs:

  # ── 1. Frontend: lint ────────────────────────────────────
  frontend-lint:
    name: 🔍 Lint · Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  # ── 2. Frontend: TypeScript ──────────────────────────────
  frontend-typecheck:
    name: 🔷 TypeScript · Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: tsc --noEmit
        working-directory: frontend
        run: npx tsc --noEmit

  # ── 3. Backend: lint ─────────────────────────────────────
  backend-lint:
    name: 🐍 Lint · Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install -r backend/requirements-dev.txt

      - name: Ruff check
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

  # ── 4. Frontend: build ───────────────────────────────────
  frontend-build:
    name: 📦 Build · Frontend
    needs: [frontend-lint, frontend-typecheck]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://ai.arvexo.ru

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  # ── 5. CI summary ────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    needs: [frontend-build, backend-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write job summary
        env:
          LINT_STATUS:      ${{ needs.frontend-lint.result }}
          TYPECHECK_STATUS: ${{ needs.frontend-typecheck.result }}
          BACKEND_STATUS:   ${{ needs.backend-lint.result }}
          BUILD_STATUS:     ${{ needs.frontend-build.result }}
          SHA:              ${{ github.sha }}
          ACTOR:            ${{ github.actor }}
          REF:              ${{ github.ref_name }}
          EVENT:            ${{ github.event_name }}
        run: |
          icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              cancelled)echo "⏹️" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⏳" ;;
            esac
          }

          overall="success"
          for s in "$LINT_STATUS" "$TYPECHECK_STATUS" "$BACKEND_STATUS" "$BUILD_STATUS"; do
            [ "$s" != "success" ] && overall="failure"
          done

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # $([ "$overall" = "success" ] && echo "✅" || echo "❌") Arvexo AI Consulting — CI

          | Check | Status |
          |---|---|
          | 🔍 Frontend Lint | $(icon "$LINT_STATUS") \`$LINT_STATUS\` |
          | 🔷 TypeScript | $(icon "$TYPECHECK_STATUS") \`$TYPECHECK_STATUS\` |
          | 🐍 Backend Lint | $(icon "$BACKEND_STATUS") \`$BACKEND_STATUS\` |
          | 📦 Frontend Build | $(icon "$BUILD_STATUS") \`$BUILD_STATUS\` |

          ---

          | | |
          |---|---|
          | **Branch** | \`$REF\` |
          | **Commit** | \`${SHA:0:7}\` |
          | **Triggered by** | @$ACTOR via \`$EVENT\` |
          EOF

      - name: Fail if CI failed
        if: |
          needs.frontend-build.result != 'success' ||
          needs.backend-lint.result   != 'success'
        run: exit 1

  # ── 6. Deploy → production ───────────────────────────────
  deploy:
    name: 🌐 Deploy → ai.arvexo.ru
    needs: ci-summary
    if: |
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      needs.ci-summary.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai.arvexo.ru

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          HOST:        ${{ secrets.SSH_HOST }}
          USER:        ${{ secrets.SSH_USER }}
          PORT:        ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$PORT" "$USER@$HOST" env DEPLOY_PATH="$DEPLOY_PATH" bash -s << 'REMOTE'
            set -euo pipefail

            cd "$DEPLOY_PATH"

            echo "▶ Pulling latest code..."
            git pull origin master

            echo "▶ Building and starting containers..."
            docker compose pull --ignore-buildable
            docker compose up --build -d --remove-orphans

            echo "▶ Waiting for backend health..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "✅ Backend healthy"
                break
              fi
              echo "  attempt $i/15..."
              sleep 4
            done

            echo "▶ Pruning unused images..."
            docker image prune -f

            echo "✅ Deploy complete"
          REMOTE

      - name: Health check
        run: |
          sleep 10
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ai.arvexo.ru/health)
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Healthy" && exit 0
            sleep 5
          done
          echo "::error::Health check failed after 6 attempts"
          exit 1

      - name: Write deploy summary
        if: always()
        env:
          SHA:   ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          JOB:   ${{ job.status }}
        run: |
          icon=$([ "$JOB" = "success" ] && echo "🟢" || echo "🔴")
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## $icon Deploy · \`${SHA:0:7}\`

          | | |
          |---|---|
          | **Target** | [ai.arvexo.ru](https://ai.arvexo.ru) |
          | **Status** | \`$JOB\` |
          | **Deployed by** | @$ACTOR |
          | **Commit** | \`${SHA:0:7}\` |
          EOF
